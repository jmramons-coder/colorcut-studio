<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>ColorCut Studio</title>
    <link rel="icon" href="assets/app-icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <button class="brand" type="button" aria-label="ColorCut Studio home">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 40 40">
              <path d="M28.5 9.6a13.8 13.8 0 1 0 .1 20.8" />
              <path d="M18.8 14.1h6.9a3.4 3.4 0 1 1 0 6.8h-4.2a2.8 2.8 0 1 0 0 5.6h6.7" />
            </svg>
          </span>
          <span>ColorCut</span>
        </button>

        <div class="header-actions">
          <button class="icon-button" id="galleryButton" type="button" aria-label="Choose another drawing" title="Choose another drawing">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4.2 5.2c0-.72.58-1.3 1.3-1.3h2.7c.72 0 1.3.58 1.3 1.3v15H4.2v-15Zm6.8-1.3h3.7v16.3H11V3.9Zm6.1 1 3.1-.58 2.7 14.62-3.1.58L17.1 4.9Z" />
            </svg>
          </button>

          <button class="icon-button" id="fullscreenButton" type="button" aria-label="Enter fullscreen" title="Enter fullscreen">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 10V4h6v2.4H6.4V10H4Zm10-6h6v6h-2.4V6.4H14V4ZM4 14h2.4v3.6H10V20H4v-6Zm17.6 0H20v6h-6v-2.4h3.6V14Z" />
            </svg>
          </button>
        </div>
      </header>

      <main class="main">
        <section class="picker-view" id="pickerView" aria-label="Drawing gallery">
          <div class="category-tabs" id="categoryTabs" role="tablist" aria-label="Library categories"></div>
          <div class="gallery-wrap">
            <div class="drawing-grid" id="drawingGrid"></div>
          </div>
        </section>

        <section class="studio-view is-hidden" id="studioView" aria-label="ColorCut activity">
          <div class="work-area">
            <div class="board-shell">
              <div class="puzzle-board" id="puzzleBoard" aria-label="Puzzle board">
                <img class="ghost-art" id="ghostArt" alt="" />
                <div class="slot-layer" id="slotLayer" aria-hidden="true"></div>
                <div class="piece-layer" id="pieceLayer"></div>
                <div class="complete-pop" id="completePop" aria-hidden="true">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m9.4 16.6-4-4 1.7-1.7 2.3 2.3 7.5-7.5 1.7 1.7-9.2 9.2Z" />
                  </svg>
                </div>
                <button class="spread-button" id="spreadButton" type="button" aria-label="Spread pieces" title="Spread pieces">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7.6 3.4 4 7l3.6 3.6 1.7-1.7L8.6 8H15a4 4 0 0 1 4 4v.2h2V12a6 6 0 0 0-6-6H8.6l.7-.9-1.7-1.7ZM5 11.8V12a6 6 0 0 0 6 6h4.4l-.7.9 1.7 1.7L20 17l-3.6-3.6-1.7 1.7.7.9H11a4 4 0 0 1-4-4v-.2H5Z" />
                  </svg>
                </button>
              </div>

              <div class="color-board is-hidden" id="colorBoard" aria-label="Coloring board">
                <img class="color-art" id="colorArt" alt="" />
                <canvas id="colorCanvas"></canvas>
              </div>

              <div class="finish-tray" id="finishTray" aria-hidden="true">
                <button class="finish-button" id="finishLibraryButton" type="button" aria-label="Back to library">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4.2 5.2c0-.72.58-1.3 1.3-1.3h2.7c.72 0 1.3.58 1.3 1.3v15H4.2v-15Zm6.8-1.3h3.7v16.3H11V3.9Zm6.1 1 3.1-.58 2.7 14.62-3.1.58L17.1 4.9Z" />
                  </svg>
                  <span>Library</span>
                </button>
                <button class="finish-button is-primary" id="finishRestartButton" type="button" aria-label="Restart">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 4.2a7.8 7.8 0 1 1-7.2 4.8l2.2.9A5.4 5.4 0 1 0 12 6.6h-.2l1.7 1.7-1.7 1.7L7.2 5.4 11.8.8l1.7 1.7-1.7 1.7H12Z" />
                  </svg>
                  <span>Restart</span>
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
